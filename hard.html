<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>اختبار PLC — 50 سؤال (متقدم)</title>

  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif; }
    body { margin: 0; background: #f6f7fb; color: #111; }
    .wrap { max-width: 980px; margin: 24px auto; padding: 16px; }

    /* نفس ستايل صفحتك الأساسية */
    .card { background: #fcf7fae0; border-radius: 16px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }

    h1 { margin: 0 0 8px; font-size: 22px; }
    .sub { color: #555; margin-bottom: 14px; }
    .topbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom: 14px; }

    /* نفس لون الشارة */
    .pill { background:#fdcef6; color:#1f2a7a; padding:8px 12px; border-radius:999px; font-size:14px; }

    .btns { display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:0; border-radius:12px; padding:10px 14px; cursor:pointer;
      font-weight:700; font-size:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }
    .primary { background:#111; color:#fff; }
    .ghost { background:#fff; color:#111; border:1px solid #ddd; box-shadow:none; }

    /* نفس لون زر إعادة المحاولة */
    .danger { background:#9f0087; color:#fff; }

    .q { border:1px solid #eee; border-radius:14px; padding:14px; margin:12px 0; background:#fff; }
    .qhead { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .qnum { font-weight:900; color:#333; }
    .qtext { font-weight:800; margin:0 0 10px; }
    .opts { display:grid; gap:8px; }
    label.opt{
      display:flex; gap:10px; align-items:flex-start;
      padding:10px; border-radius:12px; border:1px solid #e7e7e7; cursor:pointer;
      background:#fff;
    }
    label.opt:hover { background:#fafafa; }
    input[type="radio"] { margin-top:3px; }
    .muted { color:#666; font-size:13px; }

    .result{
      margin-top:14px; padding:14px; border-radius:14px; border:1px solid #e7e7e7;
      background:#fbfbff;
    }
    .score { font-size:22px; font-weight:900; margin:0 0 6px; }
    .wronglist{ margin:10px 0 0; padding:0; list-style:none; display:grid; gap:10px; }
    .wrongitem{ background:#fff; border:1px solid #eee; border-radius:12px; padding:12px; }
    .ok{ color:#0b6b2d; font-weight:800; }
    .bad{ color:#b00020; font-weight:800; }
    .footer{ margin-top:12px; color:#666; font-size:12px; }

    a.back { text-decoration:none; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>اختبار PLC المتقدم</h1>
      <div class="sub">50 سؤال أصعب (عملي + مؤقتات/عدادات + Steps). الأسئلة والخيارات تتخلط تلقائيًا.</div>

      <div class="topbar">
        <div class="pill" id="meta">عدد الأسئلة: 50</div>
        <div class="btns">
          <button class="primary" id="submitBtn">إنهاء الاختبار وإظهار النتيجة</button>
          <button class="ghost" id="shuffleBtn">إعادة خلط الأسئلة</button>
          <button class="danger" id="resetBtn">إعادة المحاولة</button>
          <a class="back" href="index.html"><button class="ghost" type="button">رجوع لاختبار 100</button></a>
        </div>
      </div>

      <div class="muted" id="note"></div>
      <div id="quiz"></div>
      <div id="result" class="result" style="display:none;"></div>

    </div>
  </div>

<script>
/* ========= أدوات صغيرة ========= */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

/* ========= بنك الأسئلة (50) =========
   تم اعتماد خطوات التعليمات حسب قائمتك:
   1 step: end, ld, ldi, and, oi, ani, ori, set, out, inv, nop, orb, andb, mps, mrd, mpp
   3 steps: ldp, andp, orp, ldf, andf, orf, rst, mc, mcr, pls, plf
   4 steps: tmr, cnt
   5 steps: ld=, ld<>, ld<, ld<=, ld>, ld>=, mov, xch
   6 steps: dcnt
   7 steps: add, sub, mul
   9 steps: dld=, dld<>, dld<, dld<=, dld>, dld>=, dmov
*/
const QUESTION_BANK = [
  /* ======== Steps (1-14) ======== */
  {a:"حسب جدول الـ Steps المعتمد: تعليمة OUT تستهلك:", o:["1 Step","3 Steps","5 Steps","9 Steps"], c:0},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة END تستهلك:", o:["1 Step","3 Steps","4 Steps","0 Steps"], c:0},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة LDP تستهلك:", o:["1 Step","3 Steps","5 Steps","9 Steps"], c:1},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة RST تستهلك:", o:["1 Step","3 Steps","5 Steps","9 Steps"], c:1},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة TMR تستهلك:", o:["1 Step","3 Steps","4 Steps","5 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة CNT تستهلك:", o:["3 Steps","4 Steps","5 Steps","6 Steps"], c:1},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة MOV تستهلك:", o:["3 Steps","4 Steps","5 Steps","9 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة XCH تستهلك:", o:["1 Step","3 Steps","5 Steps","7 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة DCNT تستهلك:", o:["4 Steps","5 Steps","6 Steps","9 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة ADD تستهلك:", o:["5 Steps","6 Steps","7 Steps","9 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة MUL تستهلك:", o:["5 Steps","6 Steps","7 Steps","9 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة LD= تستهلك:", o:["3 Steps","4 Steps","5 Steps","9 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة DLD= تستهلك:", o:["5 Steps","7 Steps","9 Steps","3 Steps"], c:2},
  {a:"حسب جدول الـ Steps المعتمد: تعليمة DMOV تستهلك:", o:["5 Steps","6 Steps","7 Steps","9 Steps"], c:3},

  /* مسائل Steps حسابية (15-18) */
  {a:"إذا كان لدينا: (LD< ثم OUT) كم مجموع Steps تقريباً؟", o:["6","8","5","4"], c:2},                 // LD< = 5 ، OUT = 1 => 6 (لكن السؤال يقول LD< ثم OUT، الصحيح 6؛ انتبه: الخيارات هنا لازم 6
  {a:"تصحيح: إذا كان لدينا: (LD< ثم OUT) كم مجموع Steps؟", o:["6","5","9","4"], c:0},               // هذا هو الصحيح
  {a:"إذا كان لدينا: (LD ثم OUT) كم مجموع Steps؟", o:["2","4","6","8"], c:0},                         // 1+1=2
  {a:"برنامج فيه 3 مقارنات (LD<, LD=, LD>) وكل واحدة بعدها OUT. كم مجموع Steps؟", o:["18","16","12","24"], c:0}, // كل مقارنة 5 + OUT 1 => 6، ثلاث مرات => 18

  /* ======== عملي Ladder/منطق (19-36) ======== */
  {a:"زر Stop في دوائر التحكم الصناعية الأفضل يكون:", o:["NO","NC","تشابهي","غير مهم"], c:1},
  {a:"لعمل Self-hold (تعشيق) للخرج Y0 نستخدم عادة:", o:["OUT فقط بدون تفرع","تفرع يحتوي Y0 مع زر Start","RST للخرج","تبديل RS485"], c:1},
  {a:"في مؤقت ON-Delay: تماس المؤقت يصبح ON عندما:", o:["فور تفعيل الدخل","بعد وصول المؤقت للقيمة المضبوطة","بعد فصل الدخل","لا يصبح ON"], c:1},
  {a:"Timer يزداد بالزمن عند:", o:["تغير الإشارة فقط","استمرار الإشارة ON","انقطاع الإشارة","تغير الجهد فقط"], c:1},
  {a:"Counter يزداد عادة عند:", o:["استمرار الإشارة ON","نبضة/حافة صاعدة","حافة هابطة فقط","الزمن"], c:1},
  {a:"أي تعليمة تُستخدم لتثبيت خرج بشكل قفلي (Latch)؟", o:["SET","RST","LDI","ORI"], c:0},
  {a:"وأي تعليمة تُستخدم لفك القفل؟", o:["SET","RST","INV","AND"], c:1},
  {a:"استخدام LDF مفيد عندما تريد:", o:["نبضة عند الحافة الصاعدة","نبضة عند الحافة الهابطة","تشغيل خرج دائم","نقل قيمة لمسجل"], c:1},
  {a:"إذا أردت تشغيل خرج فقط عند أول ضغطة Start (بدون تكرار أثناء الضغط) تستخدم:", o:["LD","LDP","MOV","TMR"], c:1},
  {a:"في دائرة Start/Stop وتعشيق: المنطق الصحيح للخرج Y0 غالباً:", o:["Y0 = Start فقط","Y0 = Stop فقط","Y0 = (Start OR Y0) AND Stop","Y0 = (Start AND Y0) OR Stop"], c:2},
  {a:"في خزان ماء بحساسين علوي وسفلي: الهدف من حساسين هو:", o:["زيادة الاستهلاك","منع الفصل/التشغيل المتكرر (Hysteresis)","زيادة Steps","تسريع RS485"], c:1},
  {a:"عند انخفاض الماء تحت الحساس السفلي: الحالة الصحيحة غالباً:", o:["تشغيل المضخة","إيقاف المضخة","تشغيل الصمام فقط","تصفير PLC"], c:0},
  {a:"عند وصول الماء للحساس العلوي: الحالة الصحيحة غالباً:", o:["تشغيل المضخة","إيقاف المضخة","زيادة العداد","تفعيل LDP"], c:1},
  {a:"في العدادات: عندما يصل العداد للقيمة المضبوطة K يصبح تماس العداد:", o:["OFF","ON","يتذبذب","لا يتغير أبداً"], c:1},
  {a:"إذا بقي دخل العداد ON دون نبضات جديدة:", o:["يزيد باستمرار","لا يزيد","يصفر","يتحول لمؤقت"], c:1},
  {a:"DCNT يُستخدم عادة من أجل:", o:["العد باتجاه واحد فقط","العد التنازلي فقط","العد تصاعدي/تنازلي حسب الاتجاه","قياس الزمن"], c:2},
  {a:"في العادة تحديد اتجاه DCNT يتم بواسطة:", o:["قيمة K","تماس/Marker لاتجاه العد","نوع الكابل","END"], c:1},
  {a:"الفرق الأساسي بين Timer و Counter هو:", o:["Timer يعتمد الزمن و Counter يعتمد عدد النبضات","Counter يعتمد الزمن","لا فرق","Timer يعتمد الضغط"], c:0},

  /* ======== عملي بيانات/مقارنات (37-46) ======== */
  {a:"مسجل D يخزن عادة:", o:["Bit واحد","Byte واحد","Word (16-bit)","زمن 1s"], c:2},
  {a:"DMOV ينقل:", o:["Word واحد","Bit","Double Word (مسجلين)","Byte واحد"], c:2},
  {a:"LD<> تعني:", o:["يساوي","لا يساوي","أكبر من","أصغر من"], c:1},
  {a:"إذا أردت مقارنة Double Word تعتمد على تعليمات:", o:["LD=","DLD= / DLD< ...","OUT","INV"], c:1},
  {a:"في المؤقت: PV تعني:", o:["القيمة الحالية التي وصل لها المؤقت","القيمة المضبوطة فقط","نوع الكابل","سرعة المسح"], c:0},
  {a:"في المؤقت: RV/SV تعني:", o:["القيمة الحالية","القيمة المضبوطة (Preset)","عنوان المداخل","زمن المسح"], c:1},
  {a:"في RS485 سبب إضافة مقاومة طرفية:", o:["زيادة الضجيج","منع انعكاس الإشارة (Reflection)","تغيير PV","زيادة Steps"], c:1},
  {a:"في الإنفرتر: التحكم بالسرعة يتم أساساً عبر:", o:["تغيير الجهد فقط","تغيير التردد مع الجهد (V/f)","تغيير IP","تغيير Steps"], c:1},
  {a:"Modbus Function 03 تعني:", o:["Read Coils","Read Holding Registers","Write Single Register","Read Discrete Inputs"], c:1},
  {a:"عناوين Slave في Modbus تكون غالباً ضمن:", o:["1-127","1-247","0-255","0-100"], c:1},

  /* ======== مسائل زمنية (47-50) ======== */
  {a:"إذا كانت قاعدة المؤقت 100ms وكتبنا TMR T0 K37 فإن الزمن الحقيقي هو:", o:["0.37s","3.7s","37s","370s"], c:1},
  {a:"إذا كانت القاعدة 10ms وكتبنا K150 فإن الزمن الحقيقي هو:", o:["0.15s","1.5s","15s","150s"], c:1},
  {a:"في Ladder: AND يمثل عادة:", o:["تفرع (Parallel)","تسلسل (Series)","تصفير","نقل"], c:1},
  {a:"في Ladder: OR يمثل عادة:", o:["تسلسل","تفرع","عكس","إخراج"], c:1}
];

/* === تأكيد العدد 50 (صارم) === */
if (QUESTION_BANK.length !== 50) {
  throw new Error("عدد أسئلة بنك hard.html يجب أن يكون 50. العدد الحالي = " + QUESTION_BANK.length);
}

/* ========= توليد نسخة أسئلة مع خلط الخيارات ========= */
let questions = [];
function buildQuiz(){
  const base = shuffle(QUESTION_BANK);
  questions = base.map((q, idx) => {
    const opts = q.o.map((t, i) => ({t, i}));
    const mixed = shuffle(opts);
    const newC = mixed.findIndex(x => x.i === q.c);
    return { id: idx, a: q.a, o: mixed.map(x => x.t), c: newC };
  });
}

/* ========= رسم الاختبار ========= */
const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");
const noteEl = document.getElementById("note");

function render(){
  resultEl.style.display = "none";
  resultEl.innerHTML = "";
  quizEl.innerHTML = "";
  noteEl.textContent = "تنبيه: الأسئلة أصعب، ووزن الـ Steps مطابق للجدول الذي زوّدتني به.";

  questions.forEach((q, i) => {
    const box = document.createElement("div");
    box.className = "q";
    box.innerHTML = `
      <div class="qhead">
        <div class="qnum">سؤال ${i+1}</div>
        <div class="muted">اختر إجابة واحدة</div>
      </div>
      <p class="qtext">${escapeHtml(q.a)}</p>
      <div class="opts">
        ${q.o.map((opt, j) => `
          <label class="opt">
            <input type="radio" name="q${i}" value="${j}" />
            <span>${escapeHtml(opt)}</span>
          </label>
        `).join("")}
      </div>
    `;
    quizEl.appendChild(box);
  });

  document.getElementById("meta").textContent = `عدد الأسئلة: ${questions.length}`;
}

/* ========= التصحيح ========= */
function grade(){
  let score = 0;
  const wrong = [];

  for(let i=0;i<questions.length;i++){
    const picked = document.querySelector(`input[name="q${i}"]:checked`);
    const val = picked ? Number(picked.value) : null;

    if (val === questions[i].c) score++;
    else {
      wrong.push({
        n: i+1,
        q: questions[i].a,
        your: val === null ? "— لم يتم الاختيار —" : questions[i].o[val],
        correct: questions[i].o[questions[i].c]
      });
    }
  }

  const percent = Math.round((score / questions.length) * 100);

  resultEl.style.display = "block";
  resultEl.innerHTML = `
    <p class="score">نتيجتك: ${score} / ${questions.length} (${percent}%)</p>
    <p class="${wrong.length ? "bad":"ok"}">
      ${wrong.length ? `عندك ${wrong.length} خطأ.` : "ممتاز! كل الإجابات صحيحة."}
    </p>
    ${wrong.length ? `
      <ul class="wronglist">
        ${wrong.map(w => `
          <li class="wrongitem">
            <div><b>سؤال ${w.n}:</b> ${escapeHtml(w.q)}</div>
            <div class="bad">إجابتك: ${escapeHtml(w.your)}</div>
            <div class="ok">الصحيح: ${escapeHtml(w.correct)}</div>
          </li>
        `).join("")}
      </ul>
    ` : ""}
  `;
  resultEl.scrollIntoView({behavior:"smooth", block:"start"});
}

/* ========= أزرار التحكم ========= */
document.getElementById("submitBtn").addEventListener("click", grade);
document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  resultEl.style.display = "none";
  resultEl.innerHTML = "";
  window.scrollTo({top:0, behavior:"smooth"});
});
document.getElementById("shuffleBtn").addEventListener("click", () => {
  buildQuiz();
  render();
  window.scrollTo({top:0, behavior:"smooth"});
});

/* ========= تشغيل ========= */
buildQuiz();
render();
</script>
</body>
</html>
