/* ========= أدوات صغيرة ========= */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

// ضمان العدد = 100
if (QUESTION_BANK.length !== 100) {
  console.warn("عدد الأسئلة الحالي =", QUESTION_BANK.length, "وليس 100. عدّل البنك إذا لزم.");
}

/* ========= توليد نسخة أسئلة مع خلط الخيارات ========= */
let questions = [];
function buildQuiz(){
  // خلط ترتيب الأسئلة
  const base = shuffle(QUESTION_BANK);

  // خلط الخيارات مع تحديث الإجابة الصحيحة
  questions = base.map((q, idx) => {
    const opts = q.o.map((t, i) => ({t, i}));
    const mixed = shuffle(opts);
    const newC = mixed.findIndex(x => x.i === q.c);
    return { id: idx, a: q.a, o: mixed.map(x => x.t), c: newC };
  });
}

/* ========= رسم الاختبار ========= */
const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");
const noteEl = document.getElementById("note");

function render(){
  resultEl.style.display = "none";
  resultEl.innerHTML = "";
  quizEl.innerHTML = "";

  noteEl.textContent = "نصيحة: لا تترك أسئلة فارغة — البرنامج سيحسبها خطأ.";

  questions.forEach((q, i) => {
    const box = document.createElement("div");
    box.className = "q";
    box.innerHTML = `
      <div class="qhead">
        <div class="qnum">سؤال ${i+1}</div>
        <div class="muted">اختر إجابة واحدة</div>
      </div>
      <p class="qtext">${escapeHtml(q.a)}</p>
      <div class="opts">
        ${q.o.map((opt, j) => `
          <label class="opt">
            <input type="radio" name="q${i}" value="${j}" />
            <span>${escapeHtml(opt)}</span>
          </label>
        `).join("")}
      </div>
    `;
    quizEl.appendChild(box);
  });

  document.getElementById("meta").textContent = `عدد الأسئلة: ${questions.length}`;
}

/* ========= التصحيح ========= */
function grade(){
  const answers = [];
  let score = 0;
  const wrong = [];

  for(let i=0;i<questions.length;i++){
    const picked = document.querySelector(`input[name="q${i}"]:checked`);
    const val = picked ? Number(picked.value) : null;
    answers.push(val);

    if (val === questions[i].c) score++;
    else {
      wrong.push({
        n: i+1,
        q: questions[i].a,
        your: val === null ? "— لم يتم الاختيار —" : questions[i].o[val],
        correct: questions[i].o[questions[i].c]
      });
    }
  }

  const percent = Math.round((score / questions.length) * 100);

  resultEl.style.display = "block";
  resultEl.innerHTML = `
    <p class="score">نتيجتك: ${score} / ${questions.length} (${percent}%)</p>
    <p class="${wrong.length ? "bad":"ok"}">
      ${wrong.length ? `عندك ${wrong.length} خطأ.` : "ممتاز! كل الإجابات صحيحة."}
    </p>
    ${wrong.length ? `
      <ul class="wronglist">
        ${wrong.map(w => `
          <li class="wrongitem">
            <div><b>سؤال ${w.n}:</b> ${escapeHtml(w.q)}</div>
            <div class="bad">إجابتك: ${escapeHtml(w.your)}</div>
            <div class="ok">الصحيح: ${escapeHtml(w.correct)}</div>
          </li>
        `).join("")}
      </ul>
    ` : ""}
  `;

  // سكرول للنتيجة
  resultEl.scrollIntoView({behavior:"smooth", block:"start"});
}

/* ========= أزرار التحكم ========= */
document.getElementById("submitBtn").addEventListener("click", grade);

document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  resultEl.style.display = "none";
  resultEl.innerHTML = "";
  window.scrollTo({top:0, behavior:"smooth"});
});

document.getElementById("shuffleBtn").addEventListener("click", () => {
  buildQuiz();
  render();
  window.scrollTo({top:0, behavior:"smooth"});
});

/* ========= تشغيل ========= */
buildQuiz();
render();
</script>
